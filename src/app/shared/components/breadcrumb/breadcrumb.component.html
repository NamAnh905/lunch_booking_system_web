<nav class="breadcrumb-nav" aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
      <a routerLink="/statistic" class="breadcrumb-link home-link" title="Trang chủ">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="home-icon">
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
    </li>

    <li *ngFor="let item of breadcrumbs; let last = last" class="breadcrumb-item" [class.active]="last"
      [aria-current]="last ? 'page' : null">
      <span class="separator">/</span>
      <a *ngIf="!last" [routerLink]="item.url" class="breadcrumb-link">{{ item.label }}</a>
      <span *ngIf="last" class="breadcrumb-current">{{ item.label }}</span>
    </li>
  </ol>
</nav>
