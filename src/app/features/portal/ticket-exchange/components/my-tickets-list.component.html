<div class="section-container">
  <h3 class="section-title">Vé đang đăng trên chợ</h3>

  @if (tickets().length > 0) {
    <div class="tickets-grid">
      @for (ticket of tickets(); track ticket.exchangeId) {
        <mat-card class="ticket-card my-ticket">
          <mat-card-header>
            <mat-card-title>{{ ticket.menuDate | date }}</mat-card-title>
            <mat-card-subtitle>Suất ăn {{ ticket.isSpecial ? 'đặc biệt' : 'thường' }}</mat-card-subtitle>
          </mat-card-header>
          <mat-card-content>
            <div class="info-row">
              <span>Trạng thái:
                <span class="status-badge" [ngClass]="ticket.status.toLowerCase()">{{ ticket.status }}</span>
              </span>
            </div>
          </mat-card-content>
          <mat-card-actions align="end">
            <button mat-stroked-button color="warn" (click)="withdraw.emit(ticket)" [disabled]="isLoading()">
              Thu hồi
            </button>
          </mat-card-actions>
        </mat-card>
      }
    </div>
  } @else if (!isLoading()) {
    <div class="empty-state-small">
      <p>Bạn chưa đăng pass vé nào.</p>
    </div>
  }
</div>
