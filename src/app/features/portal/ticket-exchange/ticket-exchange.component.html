<main class="exchange-page">
  <div class="exchange-shell">
    <header class="exchange-header">
      <div class="exchange-header__title">
        <span class="exchange-header__icon"><i class="fas fa-right-left"></i></span>
        <div>
          <h2>Chợ Pass Vé</h2>
          <p>Giao dịch, trao đổi suất ăn với đồng nghiệp</p>
        </div>
      </div>
      <button class="btn-back" routerLink="/portal/meal-order">
        <i class="fas fa-arrow-left"></i> Quay lại
      </button>
    </header>

    <div class="exchange-body">
      <mat-tab-group animationDuration="0ms" class="flat-tabs">
        <mat-tab label="Chợ vé chung">
          <div class="tab-content">
            <app-market-tickets-list
              [tickets]="marketTickets"
              [currentUserId]="currentUserId"
              [isLoading]="isLoading"
              (claim)="claimTicket($event)">
            </app-market-tickets-list>
          </div>
        </mat-tab>

        <mat-tab label="Vé tôi đang Pass">
          <div class="tab-content">
            <app-eligible-orders-list
              [orders]="eligibleOrders"
              [pendingOrderWarning]="pendingOrderWarning"
              [isLoading]="isLoading"
              (post)="postTicket($event)">
            </app-eligible-orders-list>

            <mat-divider class="section-divider"></mat-divider>

            <app-my-tickets-list
              [tickets]="myTickets"
              [isLoading]="isLoading"
              (withdraw)="withdrawTicket($event)">
            </app-my-tickets-list>
          </div>
        </mat-tab>
      </mat-tab-group>
    </div>
  </div>
</main>
