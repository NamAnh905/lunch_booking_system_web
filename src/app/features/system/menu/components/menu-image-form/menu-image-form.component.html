<div class="modal-overlay">
  <div class="modal-content">
    <div class="modal-header">
      <h3>{{ isEdit ? 'Sửa thực đơn hình ảnh' : 'Thêm thực đơn dạng Hình ảnh' }}</h3>
      <button class="close-btn" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <form #f="ngForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label>Tên menu <span class="required">*</span></label>
          <input type="text" name="name" [(ngModel)]="form.name" required appAutoFocus
            placeholder="VD: Thực đơn tuần 3 tháng 7">
        </div>

        <div class="form-group">
          <label>Tuần áp dụng <span class="required">*</span></label>
          <input type="date" name="weekDate" [(ngModel)]="form.weekDate" required>
          @if (form.weekDate) {
            <div class="week-hint">{{ weekLabel }}</div>
          }
        </div>

        <div class="form-group">
          <label>Ảnh thực đơn <span class="required">*</span></label>
          <input type="file" name="file" accept="image/*" (change)="onFileChange($event)">
        </div>

        @if (previewUrl) {
          <div class="image-preview">
            <img [src]="previewUrl" alt="Xem trước ảnh thực đơn">
          </div>
        }

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" (click)="onClose()">Hủy</button>
          <button type="submit" class="btn btn-primary" [disabled]="!f.valid || loading">
            {{ loading ? 'Đang lưu...' : 'Lưu' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
