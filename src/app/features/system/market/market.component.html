<app-crud [loading]="loading" [total]="total" [page]="page" [size]="size" [selections]="selections" [hideAdd]="true"
  (pageChange)="onPageChange($event)" (sizeChange)="onSizeChange($event)" (refresh)="onReset()">

  <div crud-filters class="filters">
    <div class="filter-group">
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-date-range-input [formGroup]="dateRange" [rangePicker]="dateRangePicker">
          <input matStartDate formControlName="start" placeholder="Từ ngày">
          <input matEndDate formControlName="end" placeholder="Đến ngày">
        </mat-date-range-input>
        <mat-datepicker-toggle matIconSuffix [for]="dateRangePicker"></mat-datepicker-toggle>
        <mat-date-range-picker #dateRangePicker panelClass="custom-date-picker-overlay"></mat-date-range-picker>
      </mat-form-field>
    </div>

    <div class="filter-group">
      <select [(ngModel)]="query.status" (ngModelChange)="onSearch()">
        <option value="">Tất cả trạng thái</option>
        <option value="OPEN">Mở bán (OPEN)</option>
        <option value="MATCHED">Đã ghép (MATCHED)</option>
        <option value="CANCELLED">Đã hủy (CANCELLED)</option>
        <option value="EXPIRED">Hết hạn - tự thu hồi (EXPIRED)</option>
      </select>
    </div>

    <div class="filter-group">
      <app-crud-search placeholder="Tìm kiếm..." [(value)]="query.keyword" (search)="onSearch()" />
    </div>
  </div>

  <table crud-table class="data-table">
    <thead>
      <tr>
        <th class="checkbox-col">
          <input type="checkbox" (change)="toggleAll($event)"
            [checked]="selections.length === data.length && data.length > 0">
        </th>
        <th class="stt-col">STT</th>
        <th class="date-col">Ngày ăn</th>
        <th>Người Pass</th>
        <th>Người Nhận</th>
        <th class="status-col">Trạng thái</th>
      </tr>
    </thead>
    <tbody>
      @for (item of data; track item.exchangeId; let i = $index) {
      <tr>
        <td class="checkbox-col">
          <input type="checkbox" [checked]="isSelected(item)" (change)="toggleSelection(item)">
        </td>
        <td class="stt-col">{{ (page - 1) * size + i + 1 }}</td>
        <td class="date-col">{{ item.menuDate }}</td>
        <td [title]="item.sellerName">{{ item.sellerName }}</td>
        <td [title]="item.buyerName || '-'">{{ item.buyerName || '-' }}</td>
        <td class="status-col">
          <span [ngClass]="{
            'status-open': item.status === 'OPEN',
            'status-matched': item.status === 'MATCHED',
            'status-cancelled': item.status === 'CANCELLED',
            'status-expired': item.status === 'EXPIRED'
          }">
            {{ item.status }}
          </span>
        </td>
      </tr>
      }
      @if (data.length === 0 && !loading) {
      <tr>
        <td colspan="6" class="text-center empty-state">Không có dữ liệu</td>
      </tr>
      }
    </tbody>
  </table>
</app-crud>
