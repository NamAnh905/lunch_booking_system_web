<div class="notification-bell">
  <button type="button" class="bell-button" (click)="toggleDropdown()" aria-label="Thông báo">
    <i class="fas fa-bell"></i>
    @if (unreadCount$ | async; as unreadCount) {
      <span class="bell-badge">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
    }
  </button>

  @if (dropdownOpen) {
    <div class="notification-panel">
      <div class="notification-panel__header">
        <span class="notification-panel__title">Thông báo</span>
        @if ((unreadCount$ | async)) {
          <button type="button" class="notification-panel__action" (click)="onMarkAllAsRead($event)">
            Đánh dấu đã đọc tất cả
          </button>
        }
      </div>

      <ul class="notification-list">
        @for (item of notifications$ | async; track item.id) {
          <li
            class="notification-item"
            [class.notification-item--unread]="!item.isRead"
            (click)="onSelect(item)">
            <div class="notification-item__title">{{ item.title }}</div>
            <div class="notification-item__content">{{ item.content }}</div>
            <div class="notification-item__time">{{ item.createdAt | date: 'dd/MM/yyyy HH:mm' }}</div>
          </li>
        } @empty {
          <li class="notification-empty">Chưa có thông báo nào</li>
        }
      </ul>
    </div>
  }
</div>
