<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm"
    style="box-shadow: 5px 3px 8px #888888 !important; padding: 10px">
    <div class="container">
        <a class="navbar-brand" routerLink="/portal/meal-order">
            <img class="logo-vnpost" src="assets/images/vnpost-logo1.png" alt="" style="width: 68%;">
        </a>

        @if (showUserMenu) {
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <!-- Left Side Of Navbar -->
            <ul class="navbar-nav mr-auto"></ul>

            <!-- Right Side Of Navbar -->
            <ul class="navbar-nav ml-auto">
                <li class="nav-item dropdown">
                    <a id="navbarDropdown" class="nav-link dropdown-toggle" href="javascript:void(0)" role="button"
                        data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" (click)="toggleDropdown()">
                        {{ (currentUser$ | async)?.username }}
                    </a>

                    @if (dropdownOpen) {
                    <div class="dropdown-menu dropdown-menu-right show" aria-labelledby="navbarDropdown">
                        <a class="dropdown-item" href="javascript:void(0)" (click)="openProfile()">Thông tin cá nhân</a>
                        <a class="dropdown-item" href="javascript:void(0)" (click)="openPassword()">Đổi mật khẩu</a>
                        <a class="dropdown-item" href="javascript:void(0)" (click)="onLogout($event)">Đăng xuất</a>
                    </div>
                    }
                </li>
            </ul>
        </div>
        }
    </div>
</nav>

@if (showUserMenu) {
<app-user-profile-modal [open]="profileModalOpen" (closed)="profileModalOpen = false"></app-user-profile-modal>
<app-user-password-modal [open]="passwordModalOpen" (closed)="passwordModalOpen = false"></app-user-password-modal>
}
